<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Now Playing</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap');

html, body { 
    margin: 0; 
    padding: 0; 
    height: 100%; 
    font-family: 'Montserrat', sans-serif; 
    overflow: hidden; 
}
body { 
    position: relative; 
    color: white; 
}

body::before { 
    content: ""; 
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100vw; 
    height: 100vh; 
    background-size: 350px 350px;
    background-repeat: repeat;
    background-position: center; 
    filter: blur(6px) brightness(0.99);
    z-index: -2; 
    transition: background-image 1s ease-in-out;
    background-image: var(--bg-url);
}

body::after { 
    content: ""; 
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100vw; 
    height: 100vh; 
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.9)); 
    z-index: -1; 
}

body.id-mode::before {
    background-image: none !important; 
    filter: brightness(0) !important; 
}
body.id-mode::after {
    background: black !important; 
}

#cover.explicit-blur {
    filter: blur(15px) !important; 
    transform: scale(1.05); 
}

header { 
    position: fixed; 
    top: 0; 
    left: 0; 
    right: 0; 
    height: 90px; 
    background: rgba(0,0,0,0.7); 
    display: flex; 
    align-items: center; 
    justify-content: center;
    overflow: hidden;
    font-family: 'Archivo Black', sans-serif;
    font-weight: 400;
    font-size: 2.2rem; 
    letter-spacing: 1.2px; 
    z-index: 10;
}

#header-text {
    white-space: nowrap;
    overflow: hidden;
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.marquee-track {
    display: flex;
    align-items: center;
    white-space: nowrap;
    will-change: transform;
}

.marquee-track.scrolling {
    animation-name: marquee-scroll;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
    justify-content: flex-start;
    position: absolute;
    left: 0;
}

.marquee-item {
    display: inline-block;
    padding-right: 100px;
}

@keyframes marquee-scroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
}

#app { 
    position: absolute; 
    top: 90px;
    padding-top: 30px;
    bottom: 0; 
    left: 0; 
    right: 0; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    padding: 20px; 
    text-align: center;
}

#cover { 
    width: min(500px, 45vmin);
    height: min(500px, 45vmin);
    border-radius: 20px; 
    object-fit: cover; 
    box-shadow: 0 12px 40px rgba(0,0,0,0.9); 
    margin-bottom: 40px; 
    transition: opacity 0.8s ease-in-out, filter 0.3s ease, transform 0.3s ease;
    background-color: transparent; 
    padding: 0;
}

body.id-mode #cover {
    object-fit: contain; 
    box-shadow: none; 
}

#title { 
    font-size: 3.5rem; 
    font-weight: 700; 
    margin: 0 0 16px 0; 
    letter-spacing: 1.5px;
    max-width: 90vw;
}
#artist { 
    font-size: 2.2rem; 
    font-weight: 400; 
    color: #ccc; 
    margin: 0;
    max-width: 90vw;
}
#loading { 
    margin-top: 20px; 
    font-size: 1.1rem; 
    color: #888; 
    font-style: italic;
}

@media (max-width: 450px) {
    #cover { width: 80vw; height: 80vw; }
    #title { font-size: 1.4rem; }
    #artist { font-size: 1rem; }
}
</style>
</head>
<body>
    <header>
        <div id="header-text">Now Playing</div>
    </header>
    <div id="app">
        <img id="cover" src="logo.jpg" alt="Station Logo" 
            onerror="this.onerror=null; updateCoverAndBackground('placeholder.jpg');"/>
        <div id="title">Loading...</div>
        <div id="artist">Your Station Tagline</div>
        <div id="loading"></div>
    </div>

    <script src="config.js"></script>
    <script>
        let headerAlternatingInterval = null;

        // Pixels per second the scrolling header text moves at.
        // Override by setting HEADER_SCROLL_SPEED in config.js (defaults to 120).
        function getScrollSpeed() {
            return (typeof HEADER_SCROLL_SPEED !== 'undefined') ? HEADER_SCROLL_SPEED : 120;
        }

        // Renders plain, non-scrolling text into the header.
        function setStaticHeaderText(text) {
            const el = document.getElementById('header-text');
            el.innerHTML = '';
            el.textContent = text;
        }

        // Renders a seamless, continuously-scrolling marquee.
        // Technique: the text is duplicated back-to-back inside a flex track,
        // which is then animated exactly -50% of its own width. Since the
        // second copy is immediately adjacent to the first, the instant the
        // first copy scrolls fully out of view the second is in the exact
        // position the first started in — so the loop restart is invisible.
        function setScrollingHeaderText(text) {
            const el = document.getElementById('header-text');
            el.innerHTML = '';

            const track = document.createElement('div');
            track.className = 'marquee-track';

            const item1 = document.createElement('span');
            item1.className = 'marquee-item';
            item1.textContent = text;

            const item2 = document.createElement('span');
            item2.className = 'marquee-item';
            item2.textContent = text;
            item2.setAttribute('aria-hidden', 'true');

            track.appendChild(item1);
            track.appendChild(item2);
            el.appendChild(track);

            // Measure one copy (including its trailing gap) to compute a
            // duration that yields a constant scroll speed regardless of
            // text length, then kick off the animation.
            requestAnimationFrame(() => {
                const itemWidth = item1.getBoundingClientRect().width +
                    parseFloat(getComputedStyle(item1).paddingRight || 0);
                const duration = Math.max(itemWidth / getScrollSpeed(), 4); // avoid absurdly fast loops for short text
                track.style.animationDuration = duration + 's';
                track.classList.add('scrolling');
            });
        }

        // Applies whichever renderer matches the requested mode.
        function renderHeaderText(mode, text) {
            const el = document.getElementById('header-text');
            if (mode === 'scrolling') {
                setScrollingHeaderText(text);
            } else {
                setStaticHeaderText(text);
            }
        }

        // Apply header text mode and color from config
        function initHeaderText() {
            const el = document.getElementById('header-text');
            if (typeof HEADER_TEXT_COLOR !== 'undefined') {
                el.style.color = HEADER_TEXT_COLOR;
            }

            if (typeof HEADER_TEXT_MODE !== 'undefined') {
                if (HEADER_TEXT_MODE === "static") {
                    renderHeaderText('static', HEADER_STATIC_TEXT);
                } else if (HEADER_TEXT_MODE === "scrolling") {
                    renderHeaderText('scrolling', HEADER_SCROLLING_TEXT);
                } else if (HEADER_TEXT_MODE === "alternating") {
                    startAlternatingHeader();
                }
            }
        }

        function startAlternatingHeader() {
            let isStatic = true;

            function toggleHeader() {
                if (isStatic) {
                    renderHeaderText('scrolling', HEADER_SCROLLING_TEXT);
                    isStatic = false;
                    headerAlternatingInterval = setTimeout(toggleHeader, HEADER_SCROLLING_DURATION * 1000);
                } else {
                    renderHeaderText('static', HEADER_STATIC_TEXT);
                    isStatic = true;
                    headerAlternatingInterval = setTimeout(toggleHeader, HEADER_STATIC_DURATION * 1000);
                }
            }

            // Start with static
            renderHeaderText('static', HEADER_STATIC_TEXT);
            headerAlternatingInterval = setTimeout(toggleHeader, HEADER_STATIC_DURATION * 1000);
        }

        function setApiStatus(apiName, status) {
            if (API_STATUS.hasOwnProperty(apiName)) {
                API_STATUS[apiName] = status;
                console.log(`API Status Updated: ${apiName} is now ${status ? 'ENABLED' : 'DISABLED'}.`);
            } else {
                console.error(`API named "${apiName}" not found. Options are 'iTunes'.`); 
            }
        }

        const coverImg  = document.getElementById("cover");
        const titleEl   = document.getElementById("title");
        const artistEl  = document.getElementById("artist");
        const loadingEl = document.getElementById("loading");
        const bodyEl    = document.body; 

        let lastSong     = { artist: "", title: "" };
        let lastIcyTitle = ""; 

        function parseSong(str) {
            console.log("Raw song string:", str);
            
            let rawQuery = str.replace(/\s+/g, ' ').trim();
            rawQuery = rawQuery.replace(/\s*\(.*?\)\s*/g, ' ').trim();
            rawQuery = rawQuery.replace(/\s*\[.*?\]\s*/g, ' ').trim();
            rawQuery = rawQuery.replace(/\s+/g, ' ').trim();
            
            let artist = "";
            let title  = "";
            
            if (rawQuery.includes("-")) {
                const parts = rawQuery.split("-").map(s => s.trim());
                artist = parts[0];
                title  = parts.slice(1).map(s => s.trim()).join(" - "); 
            } else if (rawQuery) {
                const parts = rawQuery.split(/\s+/);
                if (parts.length > 1) {
                    artist = parts[0];
                    title  = parts.slice(1).join(" ");
                } else {
                    artist = "Unknown Artist";
                    title  = rawQuery;
                }
            }
            
            if (!artist || !title) {
                artist = "Unknown Artist";
                title  = rawQuery || "Loading...";
            }
            
            console.log("Parsed:", artist, "—", title);
            return { artist, title };
        }

        function updateCoverAndBackground(url) {
            bodyEl.classList.remove('id-mode'); 
            bodyEl.style.setProperty('--bg-url', `url("${url}")`);
            coverImg.src = url;
            coverImg.style.objectFit = 'cover'; 
            coverImg.style.opacity = 0;
            setTimeout(() => { coverImg.style.opacity = 1; }, 50);
        }

        function setIDMode() {
            bodyEl.classList.add('id-mode');
            bodyEl.style.setProperty('--bg-url', `url("${LOGO_COVER}")`);
            titleEl.textContent  = (typeof ID_MODE_TEXT !== 'undefined') ? ID_MODE_TEXT : "You're Listening To Our Station";
            artistEl.textContent = "";
            coverImg.src = LOGO_COVER;
            coverImg.style.objectFit = 'contain'; 
            coverImg.style.opacity = 1;
            loadingEl.textContent = "";
            console.log("--- ID/Jingle detected. Logo displayed. ---");
        }

        // Like setIDMode(), but triggered specifically when a raw title/
        // artist string matches one of ID_KEYWORDS (see fetchNowPlaying).
        // Shows placeholder.jpg instead of the logo, on a blank background.
        function setKeywordIDMode() {
            bodyEl.classList.add('id-mode'); // .id-mode already blanks the background
            titleEl.textContent  = (typeof ID_MODE_TEXT !== 'undefined') ? ID_MODE_TEXT : "You're Listening To Our Station";
            artistEl.textContent = "";
            coverImg.src = FALLBACK_COVER;
            coverImg.style.objectFit = 'cover';
            coverImg.style.opacity = 1;
            loadingEl.textContent = "";
            console.log("--- ID keyword matched. Placeholder shown on blank background. ---");
        }

        // Checks a raw title/artist string against ID_KEYWORDS (case-insensitive
        // substring match). Used to catch station IDs/jingles that don't fit
        // the normal single-word heuristic, or Live365 auto-DJ IDs.
        function matchesIdKeyword(str) {
            if (typeof ID_KEYWORDS === 'undefined' || !Array.isArray(ID_KEYWORDS) || ID_KEYWORDS.length === 0) {
                return false;
            }
            const lower = (str || '').toLowerCase();
            return ID_KEYWORDS.some(kw => kw && lower.includes(kw.toLowerCase()));
        }

        function isExplicitOnCustomList(artist) {
            const clean = s => s.toLowerCase().replace(/[^a-z0-9]/g, '');
            const cleanArtist = clean(artist);
            const isExplicit = CUSTOM_EXPLICIT_LIST.some(item =>
                item.artist && clean(item.artist) === cleanArtist
            );
            if (isExplicit) console.warn(`[Explicit] "${artist}" on custom list — blurring cover.`);
            return isExplicit;
        }

        async function fetchMetadataFromiTunes(artist, track) {
            if (!API_STATUS.iTunes) { console.log("iTunes API is disabled."); return null; }
            if (!artist || !track) return null;

            const query     = `${artist} ${track}`.trim();
            const iTunesUrl = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&entity=song&limit=1`;

            try {
                loadingEl.textContent = "Fetching artwork...";
                const resp = await fetch(iTunesUrl);
                if (!resp.ok) { console.error(`iTunes HTTP ${resp.status}`); return null; }
                const data = await resp.json();
                if (data.resultCount === 0) { console.error(`iTunes: no results for "${query}"`); return null; }
                if (data.results && data.results.length > 0) {
                    const result = data.results[0];
                    if (result.artworkUrl100) {
                        const coverUrl    = result.artworkUrl100.replace('100x100bb', '3000x3000bb');
                        const cleanTitle  = result.trackName  || result.collectionName       || 'Unknown Title';
                        const cleanArtist = result.artistName || result.collectionArtistName || 'Unknown Artist';
                        const isExplicit  = (result.trackExplicitness === 'explicit' || result.collectionExplicitness === 'explicit');
                        console.log(`[iTunes] ${cleanArtist} — ${cleanTitle} (explicit flag: ${isExplicit})`);
                        return { title: cleanTitle, artist: cleanArtist, coverUrl, isExplicit };
                    }
                }
                console.error("iTunes: results found but missing artworkUrl100.");
            } catch (e) {
                console.error("iTunes fetch error:", e.message);
            }
            return null;
        }

        async function fetchIcyTitleFromCaster() {
            const resp = await fetch(STATS_URL);
            if (!resp.ok) throw new Error("Network error fetching Caster.fm stats.");
            const data = await resp.json();

            console.log("Caster.fm raw:", JSON.stringify(data).slice(0, 500));

            const sources   = data[1]?.source; 
            const mountKeys = sources ? Object.keys(sources) : [];
            if (mountKeys.length === 0) return "";

            const currentSource = sources[mountKeys[0]];
            console.log("Mount source:", JSON.stringify(currentSource).slice(0, 300));

            const icyTitle = currentSource["display-title"] || currentSource.metadata?.x_icy_title || "";
            console.log("ICY title:", icyTitle);
            return icyTitle.trim();
        }

        // Live365 has no officially documented public API, but this is the
        // real endpoint Live365's own website/embed player calls under the
        // hood (found via the browser network tab). It returns structured
        // artist/title data plus direct cover art — no iTunes lookup needed.
        // Because it's undocumented, Live365 could change its shape or
        // access rules at any time without notice.
        async function fetchLive365NowPlaying() {
            const url = `https://api.live365.com/station/${LIVE365_STATION_ID}`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`Live365 HTTP ${resp.status}`);
            const data = await resp.json();

            console.log("Live365 raw:", JSON.stringify(data).slice(0, 500));

            const track = data['current-track'];
            if (!track || (!track.artist && !track.title)) {
                return { artist: '', title: '', coverUrl: null };
            }

            return {
                artist: (track.artist || '').trim(),
                title: (track.title || '').trim(),
                coverUrl: track.art || null,
            };
        }

        // Normalizes either stream host into a common shape:
        // { artist, title, coverUrl, rawKey }
        // coverUrl is only set when the host already provides art directly
        // (Live365) — for Caster.fm it stays null and the iTunes lookup
        // in update() fills it in instead.
        async function fetchNowPlaying() {
            try {
                if (typeof STREAM_HOST_TYPE !== 'undefined' && STREAM_HOST_TYPE === "live365") {
                    const np = await fetchLive365NowPlaying();
                    const combined = `${np.artist} ${np.title}`.trim();
                    if (matchesIdKeyword(combined)) {
                        return { artist: '', title: '', coverUrl: null, rawKey: combined || 'live365-id', isKeywordId: true };
                    }
                    return { ...np, rawKey: `${np.artist} - ${np.title}` };
                }
                const icyTitle = await fetchIcyTitleFromCaster();
                if (!icyTitle) return null;
                if (matchesIdKeyword(icyTitle)) {
                    return { artist: '', title: '', coverUrl: null, rawKey: icyTitle, isKeywordId: true };
                }
                const parsed = parseSong(icyTitle);
                // parseSong() uses "Unknown Artist" as its sentinel for
                // unparseable/single-word (station ID / jingle) titles.
                // Normalize that to an empty string here so the ID-mode
                // check in update() works the same way for both hosts.
                const artist = (parsed.artist === "Unknown Artist") ? "" : parsed.artist;
                return { artist, title: parsed.title, coverUrl: null, rawKey: icyTitle };
            } catch (e) {
                console.error("Error fetching now playing:", e);
                return null;
            }
        }

        async function update() {
            loadingEl.textContent = "Checking for new track...";

            const nowPlaying = await fetchNowPlaying();
            if (!nowPlaying) { loadingEl.textContent = ""; return; }

            const trackKey = nowPlaying.rawKey || `${nowPlaying.artist} - ${nowPlaying.title}`;
            if (!trackKey.trim() || trackKey === lastIcyTitle) {
                loadingEl.textContent = "";
                return;
            }
            lastIcyTitle = trackKey;

            if (nowPlaying.isKeywordId) {
                setKeywordIDMode();
                return;
            }

            if (!nowPlaying.artist || !nowPlaying.title) {
                setIDMode();
                return;
            }

            console.log(`\n--- NEW SONG: ${nowPlaying.artist} — ${nowPlaying.title} ---`);

            const blurCover = isExplicitOnCustomList(nowPlaying.artist);
            coverImg.classList.remove('explicit-blur');
            if (blurCover) {
                console.warn("CUSTOM LIST TRIGGERED BLUR.");
                coverImg.classList.add('explicit-blur');
            }

            if (nowPlaying.coverUrl) {
                // The stream host (Live365) already gave us matched cover art
                // directly — no need for an iTunes lookup.
                titleEl.textContent  = nowPlaying.title;
                artistEl.textContent = nowPlaying.artist;
                updateCoverAndBackground(nowPlaying.coverUrl);
                if (!blurCover) loadingEl.textContent = "";
            } else {
                const metadata = await fetchMetadataFromiTunes(nowPlaying.artist, nowPlaying.title);
                if (metadata && metadata.coverUrl) {
                    titleEl.textContent  = metadata.title;
                    artistEl.textContent = metadata.artist;
                    updateCoverAndBackground(metadata.coverUrl);
                } else {
                    console.warn("iTunes failed — using raw title + placeholder.");
                    titleEl.textContent  = nowPlaying.title;
                    artistEl.textContent = nowPlaying.artist;
                    updateCoverAndBackground(FALLBACK_COVER);
                }
                if (!blurCover) loadingEl.textContent = "";
            }

            lastSong = { artist: nowPlaying.artist, title: nowPlaying.title };
            console.log("--- END UPDATE ---\n");
        }

        // Applies STATION_NAME (config.js) to the places that show it
        // before the first track has loaded: the browser tab title and
        // the placeholder title text shown briefly before update() runs.
        function initStationDefaults() {
            if (typeof STATION_NAME === 'undefined' || !STATION_NAME) return;
            document.title = `${STATION_NAME} - Now Playing`;
            titleEl.textContent = STATION_NAME;
        }

        // Initialize header text
        initHeaderText();
        initStationDefaults();

        // Start music polling
        update(); 
        setInterval(() => { if (!document.hidden) update(); }, UPDATE_INTERVAL);
    </script>
</body>
</html>
